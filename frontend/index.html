    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <meta name="theme-color" content="#f97316" />

    <!-- SEO -->
    <title>Artfest – Platformă pentru artizanii de evenimente</title>

    <meta
      name="description"
      content="Artfest este platforma dedicată artizanilor de evenimente. Creează-ți un profil online gratuit, distribuie-l clienților, vinde invitații instant, gestionează albume QR și organizarea meselor."
    />

    <meta
      name="keywords"
      content="artfest, artizani evenimente, invitații online, albume QR, organizare mese"
    />

    <!-- ⚠️ cât timp site-ul e în maintenance -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://artfest.ro/" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Artfest – Platformă pentru artizanii de evenimente"
    />

    <meta
      property="og:description"
      content="Profiluri gratuite pentru artizanii de evenimente, invitații online, albume QR și organizare mese."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://artfest.ro/" />

    <meta
      property="og:image"
      content="https://media.artfest.ro/branding/LogoArtfest.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Artfest – Platformă pentru artizanii de evenimente"
    />

    <meta
      name="twitter:description"
      content="Profiluri gratuite pentru artizanii de evenimente."
    />

    <meta
      name="twitter:image"
      content="https://media.artfest.ro/branding/LogoArtfest.png"
    />

    <!-- Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://media.artfest.ro/branding/LogoArtfest.png"
    />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Artfest",
        "url": "https://artfest.ro/",
        "description": "Platformă pentru artizanii de evenimente.",
        "publisher": {
          "@type": "Organization",
          "name": "Artfest"
        }
      }
    </script>

    <!-- 🌗 Theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var d = document.documentElement;

          if (t === "light" || t === "dark") {
            d.setAttribute("data-theme", t);
          } else {
            d.removeAttribute("data-theme");
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <noscript>
      Ai nevoie de JavaScript pentru a rula această aplicație.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
